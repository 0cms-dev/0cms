<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Config CMS | Admin Dashboard</title>
    <style>
        :root {
            --primary: #3498db;
            --sidebar-bg: #2c3e50;
            --topbar-bg: #fff;
            --text-main: #333;
            --border-color: #eee;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #f9f9f9; }
        
        .layout { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.2rem; }
        .sidebar-nav { flex: 1; padding: 20px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #cbd5e0; transition: background 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        
        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .topbar { height: 60px; background: var(--topbar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .preview-container { flex: 1; background: #e0e0e0; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        /* Components */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 0.85rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-github { background: #24292e; color: white; display: flex; align-items: center; gap: 8px; }
        
        .change-log { position: absolute; right: 20px; top: 80px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid var(--border-color); display: none; flex-direction: column; max-height: 80%; z-index: 100; }
        .log-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; display: flex; justify-content: space-between; }
        .log-content { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.8rem; }
        .change-item { padding: 10px; border-bottom: 1px solid #f5f5f5; }
        .selector { color: #3498db; font-family: monospace; font-size: 0.7rem; margin-bottom: 4px; }
        
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: #e2e8f0; color: #4a5568; }
        .status-badge.online { background: #c6f6d5; color: #22543d; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">Zero-Config CMS</div>
            <nav class="sidebar-nav">
                <div class="nav-item active">Visual Editor</div>
                <div class="nav-item">Settings</div>
                <div class="nav-item">History</div>
            </nav>
            <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <button class="btn btn-github" style="width: 100%;">Connect GitHub</button>
            </div>
        </aside>
        
        <main class="main">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span id="siteStatus" class="status-badge online">Connected: index.html</span>
                    <span id="changeCounter" style="display:none; color: var(--primary); font-size: 0.8rem; cursor: pointer;">0 Changes</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="toggleCms" class="btn btn-primary">Enable CMS</button>
                    <button id="publishBtn" class="btn btn-primary" style="display:none; background: #2ecc71;">Publish to GitHub</button>
                </div>
            </header>
            
            <div class="preview-container">
                <iframe id="previewFrame" src="index.html"></iframe>
            </div>
            
            <div id="logPanel" class="change-log">
                <div class="log-header">
                    <span>Local Changes</span>
                    <button onclick="document.getElementById('logPanel').style.display='none'" style="border:none;background:none;cursor:pointer;">&times;</button>
                </div>
                <div id="logContent" class="log-content"></div>
                <div style="padding:15px; border-top: 1px solid var(--border-color);">
                    <button id="clearBtn" class="btn" style="width:100%; background:#f5f5f5; color:#666;">Clear All</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const frame = document.getElementById('previewFrame');
        const toggleBtn = document.getElementById('toggleCms');
        const pubBtn = document.getElementById('publishBtn');
        const counter = document.getElementById('changeCounter');
        const logPanel = document.getElementById('logPanel');
        const logContent = document.getElementById('logContent');
        
        let cmsEnabled = false;
        let changes = {};

        // 1. Toggle CMS inside Iframe
        toggleBtn.onclick = () => {
            cmsEnabled = !cmsEnabled;
            frame.contentWindow.postMessage({ type: 'CMS_TOGGLE', enabled: cmsEnabled }, '*');
            toggleBtn.textContent = cmsEnabled ? 'Disable CMS' : 'Enable CMS';
            toggleBtn.style.background = cmsEnabled ? '#e74c3c' : '#3498db';
        };

        // 2. Listen for changes from Iframe
        window.onmessage = (e) => {
            if (e.data.type === 'CMS_CHANGED') {
                changes = e.data.changes;
                updateUI();
            }
        };

        function updateUI() {
            const count = Object.keys(changes).length;
            counter.textContent = `${count} Changes`;
            counter.style.display = count > 0 ? 'inline' : 'none';
            pubBtn.style.display = count > 0 ? 'inline' : 'none';
            
            // Build log
            logContent.innerHTML = '';
            for (const [selector, text] of Object.entries(changes)) {
                const item = document.createElement('div');
                item.className = 'change-item';
                const display = text.length > 50 ? text.substring(0, 50) + '...' : text;
                item.innerHTML = `
                    <div class="selector">${selector}</div>
                    <div style="font-weight:500">${display}</div>
                `;
                logContent.appendChild(item);
            }
        }

        counter.onclick = () => {
            logPanel.style.display = logPanel.style.display === 'flex' ? 'none' : 'flex';
        };

        pubBtn.onclick = () => {
            const repo = prompt('Enter GitHub Repo (user/repo):', 'martin/0CMS');
            const token = prompt('Enter GitHub PAT (token):');
            if (repo && token) {
                alert('GitHub Commit would now send ' + Object.keys(changes).length + ' changes to: ' + repo);
            }
        };

        document.getElementById('clearBtn').onclick = () => {
             changes = {};
             updateUI();
             frame.contentWindow.postMessage({ type: 'CMS_CLEAR' }, '*');
             logPanel.style.display = 'none';
        };
    </script>
</body>
</html>
